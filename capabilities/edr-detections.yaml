naftiko: 1.0.0-alpha2
info:
  label: Trellix EDR API — Detections
  description: 'Trellix EDR API — Detections. 1 operations. Lead operation: List detections. Self-contained Naftiko capability
    covering one Trellix business surface.'
  tags:
  - Trellix
  - Detections
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TRELLIX_API_KEY: TRELLIX_API_KEY
capability:
  consumes:
  - type: http
    namespace: edr-detections
    baseUri: https://api.manage.trellix.com
    description: Trellix EDR API — Detections business capability. Self-contained, no shared references.
    resources:
    - name: edr-v2-detections
      path: /edr/v2/detections
      operations:
      - name: listdetections
        method: GET
        description: List detections
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: since
          in: query
          type: string
          description: Return detections that occurred after this ISO 8601 timestamp.
        - name: threatId
          in: query
          type: string
          description: Filter detections associated with a specific threat
    authentication:
      type: bearer
      token: '{{env.TRELLIX_API_KEY}}'
  exposes:
  - type: rest
    namespace: edr-detections-rest
    port: 8080
    description: REST adapter for Trellix EDR API — Detections. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/edr/v2/detections
      name: edr-v2-detections
      description: REST surface for edr-v2-detections.
      operations:
      - method: GET
        name: listdetections
        description: List detections
        call: edr-detections.listdetections
        with:
          since: rest.since
          threatId: rest.threatId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: edr-detections-mcp
    port: 9090
    transport: http
    description: MCP adapter for Trellix EDR API — Detections. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-detections
      description: List detections
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: edr-detections.listdetections
      with:
        since: tools.since
        threatId: tools.threatId
      outputParameters:
      - type: object
        mapping: $.
