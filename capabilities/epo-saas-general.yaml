naftiko: 1.0.0-alpha2
info:
  label: Trellix ePO SaaS API
  description: 'Trellix ePO SaaS API. 4 operations. Lead operation: List tags. Self-contained Naftiko capability covering
    one Trellix business surface.'
  tags:
  - Trellix
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TRELLIX_API_KEY: TRELLIX_API_KEY
capability:
  consumes:
  - type: http
    namespace: epo-saas-general
    baseUri: https://api.manage.trellix.com
    description: Trellix ePO SaaS API business capability. Self-contained, no shared references.
    resources:
    - name: epo-v2-tags
      path: /epo/v2/tags
      operations:
      - name: listtags
        method: GET
        description: List tags
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createtag
        method: POST
        description: Create a tag
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: epo-v2-tags-tagId
      path: /epo/v2/tags/{tagId}
      operations:
      - name: gettag
        method: GET
        description: Get tag details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deletetag
        method: DELETE
        description: Delete a tag
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.TRELLIX_API_KEY}}'
  exposes:
  - type: rest
    namespace: epo-saas-general-rest
    port: 8080
    description: REST adapter for Trellix ePO SaaS API. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/epo/v2/tags
      name: epo-v2-tags
      description: REST surface for epo-v2-tags.
      operations:
      - method: GET
        name: listtags
        description: List tags
        call: epo-saas-general.listtags
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createtag
        description: Create a tag
        call: epo-saas-general.createtag
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/epo/v2/tags/{tagid}
      name: epo-v2-tags-tagid
      description: REST surface for epo-v2-tags-tagId.
      operations:
      - method: GET
        name: gettag
        description: Get tag details
        call: epo-saas-general.gettag
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletetag
        description: Delete a tag
        call: epo-saas-general.deletetag
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: epo-saas-general-mcp
    port: 9090
    transport: http
    description: MCP adapter for Trellix ePO SaaS API. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-tags
      description: List tags
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: epo-saas-general.listtags
      outputParameters:
      - type: object
        mapping: $.
    - name: create-tag
      description: Create a tag
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: epo-saas-general.createtag
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-tag-details
      description: Get tag details
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: epo-saas-general.gettag
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-tag
      description: Delete a tag
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: epo-saas-general.deletetag
      outputParameters:
      - type: object
        mapping: $.
