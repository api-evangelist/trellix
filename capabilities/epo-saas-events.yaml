naftiko: 1.0.0-alpha2
info:
  label: Trellix ePO SaaS API — Events
  description: 'Trellix ePO SaaS API — Events. 1 operations. Lead operation: List threat events. Self-contained Naftiko capability
    covering one Trellix business surface.'
  tags:
  - Trellix
  - Events
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TRELLIX_API_KEY: TRELLIX_API_KEY
capability:
  consumes:
  - type: http
    namespace: epo-saas-events
    baseUri: https://api.manage.trellix.com
    description: Trellix ePO SaaS API — Events business capability. Self-contained, no shared references.
    resources:
    - name: epo-v2-events
      path: /epo/v2/events
      operations:
      - name: listevents
        method: GET
        description: List threat events
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: since
          in: query
          type: string
          description: Return events that occurred after this ISO 8601 timestamp. Maximum lookback is 3 days due to data retention
            limits.
        - name: filter
          in: query
          type: string
          description: Filter expression to narrow events by attributes such as severity, analyzer name, or agent GUID.
    authentication:
      type: bearer
      token: '{{env.TRELLIX_API_KEY}}'
  exposes:
  - type: rest
    namespace: epo-saas-events-rest
    port: 8080
    description: REST adapter for Trellix ePO SaaS API — Events. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/epo/v2/events
      name: epo-v2-events
      description: REST surface for epo-v2-events.
      operations:
      - method: GET
        name: listevents
        description: List threat events
        call: epo-saas-events.listevents
        with:
          since: rest.since
          filter: rest.filter
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: epo-saas-events-mcp
    port: 9090
    transport: http
    description: MCP adapter for Trellix ePO SaaS API — Events. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-threat-events
      description: List threat events
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: epo-saas-events.listevents
      with:
        since: tools.since
        filter: tools.filter
      outputParameters:
      - type: object
        mapping: $.
