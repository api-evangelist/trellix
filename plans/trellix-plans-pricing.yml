description: Machine-readable plans and pricing scaffold for this API provider. Conforms to the API Commons
  Plans schema. Tier limits and prices are scaffold defaults; replace with provider-published values.
plans:
  - id: trellix-free
    name: Free
    type: freemium
    description: Free entry tier for the Trellix API surface. Intended for evaluation, prototyping, and
      low-volume integrations. Real limits and pricing must be reconciled with the provider's published
      plan documentation.
    entries:
      - label: API Requests
        description: Monthly API request quota across all included endpoints
        name: api_requests
        type: quota
        metric: requests
        limit: 1000
        timeFrame: month
        geo: global
        domains:
          - https://your-epo-server:8443/remote
          - https://api.manage.trellix.com
          - https://dxl.trellix.com
          - https://{hx-appliance}/hx/api/v3
          - https://{epo-server}:8443
          - https://etp.us.fireeye.com/api/v1
          - https://apps.fireeye.com/helix/api/v3
          - https://{sandbox-server}/php
          - https://feapi.marketplace.apps.fireeye.com
          - https://api-docs.us.fireeye.com
        unit: 1
        price: '0.00'
        userMultiplied: false
