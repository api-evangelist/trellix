description: Trellix does not publish self-serve API plans or pricing; the public pricing page directs
  prospects to contact sales for an enterprise quote. API entitlements ride alongside purchased Trellix
  product licenses (XDR, EDR, ePO, etc.) under contract.
sources:
  - https://www.trellix.com/pricing/
notes: Public pricing page returns 403 to automated fetches and Trellix only markets enterprise
  contact-sales motions; per-API tiered prices are not published.
plans:
  - id: trellix-contact-sales
    name: Contact Sales
    type: enterprise
    description: API access bundled with a purchased Trellix product license (XDR, EDR, ePO, NDR,
      etc.). Pricing, entitlements, and SLAs are negotiated per contract.
    entries:
      - label: API Access
        name: api_access
        type: flat
        metric: varies
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Bundled with Trellix Product License
      - name: Enterprise Support
      - name: Contractual SLA
