description: FinOps shape for Trellix cannot be reconciled from public sources; pricing is
  contact-sales only and consumption telemetry sits behind an authenticated developer portal.
sources:
  - https://www.trellix.com/pricing/
notes: Public pricing page is gated, and Trellix does not publish per-API meter or invoice
  documentation. FOCUS column values and meters can only be confirmed once a license contract is
  active and the authenticated developer portal is reviewed.
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Musarubra US LLC (Trellix)
serviceCategory: Cybersecurity
billingModel:
  pricingCategory: Contract / Negotiated
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
focusColumns:
  ServiceName: Trellix
  ServiceCategory: Cybersecurity
  ProviderName: Trellix
  PublisherName: Musarubra US LLC (Trellix)
  InvoiceIssuerName: Musarubra US LLC (Trellix)
  BillingCurrency: USD
meters:
  - name: license_seats
    unit: seat
    aggregation: max
    dimensions:
      - product
principles:
  - name: Visibility
    description: Per-tenant consumption (endpoints, telemetry volume, API usage) is exposed inside the
      authenticated Trellix Insights / ePO console rather than a public usage API; finance reconciles
      against the annual license contract.
  - name: Allocation
    description: Allocate cost by Trellix product line (EDR, XDR, NDR, ePO) and by managed-tenant when
      MSSPs operate multi-customer deployments.
  - name: Optimization
    description: Optimization is contractual — right-size protected endpoint counts, retire unused
      product modules, and consolidate tenants at renewal.
  - name: Accountability
    description: Security operations / CISO organization owns the Trellix contract; procurement
      manages renewal and true-up against actual seat consumption.
