specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Trellix
providerId: trellix
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Cybersecurity
  - Endpoint Security
  - XDR
  - Rate Limiting
description: Trellix does not publish public rate-limit documentation. Per-tenant limits are exposed
  inside the authenticated Trellix developer portal alongside purchased product licenses.
sources:
  - https://www.trellix.com/pricing/
notes: Rate-limit numbers are documented behind authenticated Trellix developer portal pages and
  governed by the customer's tenant license; public pricing fetch returned 403.
responseCodes:
  throttled: 429
limits:
  - name: Tenant Limit
    scope: tenant
    metric: varies
    limit: see authenticated developer portal
policies:
  - name: Tenant-Scoped Throttling
    description: Limits are scoped to the customer's licensed Trellix tenant and are surfaced inside
      the authenticated developer portal rather than published publicly.
maintainers:
