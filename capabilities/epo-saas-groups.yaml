naftiko: 1.0.0-alpha2
info:
  label: Trellix ePO SaaS API — Groups
  description: 'Trellix ePO SaaS API — Groups. 1 operations. Lead operation: List device groups. Self-contained Naftiko capability
    covering one Trellix business surface.'
  tags:
  - Trellix
  - Groups
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TRELLIX_API_KEY: TRELLIX_API_KEY
capability:
  consumes:
  - type: http
    namespace: epo-saas-groups
    baseUri: https://api.manage.trellix.com
    description: Trellix ePO SaaS API — Groups business capability. Self-contained, no shared references.
    resources:
    - name: epo-v2-groups
      path: /epo/v2/groups
      operations:
      - name: listgroups
        method: GET
        description: List device groups
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.TRELLIX_API_KEY}}'
  exposes:
  - type: rest
    namespace: epo-saas-groups-rest
    port: 8080
    description: REST adapter for Trellix ePO SaaS API — Groups. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/epo/v2/groups
      name: epo-v2-groups
      description: REST surface for epo-v2-groups.
      operations:
      - method: GET
        name: listgroups
        description: List device groups
        call: epo-saas-groups.listgroups
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: epo-saas-groups-mcp
    port: 9090
    transport: http
    description: MCP adapter for Trellix ePO SaaS API — Groups. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-device-groups
      description: List device groups
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: epo-saas-groups.listgroups
      outputParameters:
      - type: object
        mapping: $.
