naftiko: "1.0.0-alpha1"

info:
  label: "Trellix ePO SaaS API"
  description: >-
    Cloud-based ePolicy Orchestrator API for managing devices, events, tags,
    groups, queries, and response actions through the Trellix cloud management
    platform.
  tags:
    - Cloud Management
    - Endpoint Management
    - Enterprise Security
    - Policy Orchestration
    - SaaS
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      TRELLIX_EPO_API_KEY: TRELLIX_EPO_API_KEY

capability:
  consumes:
    - type: http
      namespace: trellix-epo
      baseUri: https://api.manage.trellix.com
      description: "Trellix ePO SaaS cloud management API"
      authentication:
        type: bearer
        token: "{{TRELLIX_EPO_API_KEY}}"
      resources:
        - name: devices
          path: /epo/v2/devices
          description: "Managed endpoint devices"
          operations:
            - name: list-devices
              method: GET
              description: "List managed devices"
              inputParameters:
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Max results"
                - name: filter
                  in: query
                  type: string
                  required: false
                  description: "Filter expression"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-device
              method: GET
              description: "Get device details"
              inputParameters:
                - name: deviceId
                  in: path
                  type: string
                  required: true
                  description: "Device identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: events
          path: /epo/v2/events
          description: "Threat events from managed devices"
          operations:
            - name: list-events
              method: GET
              description: "List threat events"
              inputParameters:
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Max results"
                - name: since
                  in: query
                  type: string
                  required: false
                  description: "Filter by date"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: tags
          path: /epo/v2/tags
          description: "Device tags for grouping and policy application"
          operations:
            - name: list-tags
              method: GET
              description: "List tags"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-tag
              method: POST
              description: "Create a tag"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  description: "{{tools.description}}"

        - name: groups
          path: /epo/v2/groups
          description: "Device groups"
          operations:
            - name: list-groups
              method: GET
              description: "List device groups"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: queries
          path: /epo/v2/queries
          description: "Saved queries for reporting and hunting"
          operations:
            - name: list-queries
              method: GET
              description: "List saved queries"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: execute-query
              method: POST
              description: "Execute a saved query"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  queryId: "{{tools.queryId}}"

        - name: response-actions
          path: /epo/v2/response-actions
          description: "Response actions on managed devices"
          operations:
            - name: create-response-action
              method: POST
              description: "Create a response action"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  type: "{{tools.type}}"
                  deviceId: "{{tools.deviceId}}"

  exposes:
    - type: rest
      port: 8111
      namespace: trellix-epo-api
      resources:
        - path: /v1/devices
          name: devices
          description: "Managed devices"
          operations:
            - method: GET
              name: list-devices
              description: "List devices"
              call: "trellix-epo.list-devices"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/events
          name: events
          description: "Threat events"
          operations:
            - method: GET
              name: list-events
              description: "List events"
              call: "trellix-epo.list-events"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/tags
          name: tags
          description: "Device tags"
          operations:
            - method: GET
              name: list-tags
              description: "List tags"
              call: "trellix-epo.list-tags"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-tag
              description: "Create tag"
              call: "trellix-epo.create-tag"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9111
      namespace: trellix-epo-mcp
      transport: http
      tools:
        - name: list-devices
          description: "List managed endpoint devices in ePO SaaS"
          hints:
            readOnly: true
            openWorld: true
          call: "trellix-epo.list-devices"
          with:
            limit: "tools.limit"
            filter: "tools.filter"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-events
          description: "List threat events from managed devices"
          hints:
            readOnly: true
            openWorld: true
          call: "trellix-epo.list-events"
          with:
            limit: "tools.limit"
            since: "tools.since"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-tags
          description: "List device tags used for policy grouping"
          hints:
            readOnly: true
            openWorld: true
          call: "trellix-epo.list-tags"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-groups
          description: "List device groups for organizational management"
          hints:
            readOnly: true
            openWorld: true
          call: "trellix-epo.list-groups"
          outputParameters:
            - type: object
              mapping: "$."
        - name: execute-query
          description: "Execute a saved ePO query for reporting and analysis"
          hints:
            readOnly: true
            openWorld: false
          call: "trellix-epo.execute-query"
          with:
            queryId: "tools.queryId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-response-action
          description: "Create a response action on a managed device (quarantine, scan, remediate)"
          hints:
            readOnly: false
            destructive: true
            idempotent: false
          call: "trellix-epo.create-response-action"
          with:
            type: "tools.type"
            deviceId: "tools.deviceId"
          outputParameters:
            - type: object
              mapping: "$."
