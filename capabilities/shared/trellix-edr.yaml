naftiko: "1.0.0-alpha1"

info:
  label: "Trellix EDR API"
  description: >-
    Endpoint Detection and Response API for threat hunting, investigation,
    and automated response capabilities across managed endpoints.
  tags:
    - Endpoint Detection
    - Forensics
    - Incident Response
    - Threat Hunting
    - XDR
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      TRELLIX_EDR_API_KEY: TRELLIX_EDR_API_KEY

capability:
  consumes:
    - type: http
      namespace: trellix-edr
      baseUri: https://api.manage.trellix.com
      description: "Trellix EDR endpoint detection and response API"
      authentication:
        type: bearer
        token: "{{TRELLIX_EDR_API_KEY}}"
      resources:
        - name: threats
          path: /edr/v2/threats
          description: "Detected threats"
          operations:
            - name: list-threats
              method: GET
              description: "List detected threats"
              inputParameters:
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Max results"
                - name: since
                  in: query
                  type: string
                  required: false
                  description: "Filter by date"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-threat
              method: GET
              description: "Get threat details"
              inputParameters:
                - name: threatId
                  in: path
                  type: string
                  required: true
                  description: "Threat identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: detections
          path: /edr/v2/detections
          description: "Endpoint detections"
          operations:
            - name: list-detections
              method: GET
              description: "List detections"
              inputParameters:
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Max results"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: alerts
          path: /edr/v2/alerts
          description: "Security alerts"
          operations:
            - name: list-alerts
              method: GET
              description: "List alerts"
              inputParameters:
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Max results"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: searches
          path: /edr/v2/searches
          description: "Real-time searches"
          operations:
            - name: list-searches
              method: GET
              description: "List searches"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-search
              method: POST
              description: "Create a real-time search"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  query: "{{tools.query}}"
                  hosts: "{{tools.hosts}}"

        - name: reactions
          path: /edr/v2/reactions
          description: "Response reactions"
          operations:
            - name: create-reaction
              method: POST
              description: "Execute a response reaction"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  type: "{{tools.type}}"
                  hostId: "{{tools.hostId}}"

  exposes:
    - type: rest
      port: 8110
      namespace: trellix-edr-api
      resources:
        - path: /v1/threats
          name: threats
          description: "Detected threats"
          operations:
            - method: GET
              name: list-threats
              description: "List threats"
              call: "trellix-edr.list-threats"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/detections
          name: detections
          description: "Endpoint detections"
          operations:
            - method: GET
              name: list-detections
              description: "List detections"
              call: "trellix-edr.list-detections"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/alerts
          name: alerts
          description: "Security alerts"
          operations:
            - method: GET
              name: list-alerts
              description: "List alerts"
              call: "trellix-edr.list-alerts"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/searches
          name: searches
          description: "Real-time searches"
          operations:
            - method: GET
              name: list-searches
              description: "List searches"
              call: "trellix-edr.list-searches"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-search
              description: "Create search"
              call: "trellix-edr.create-search"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9110
      namespace: trellix-edr-mcp
      transport: http
      tools:
        - name: list-threats
          description: "List detected threats from EDR"
          hints:
            readOnly: true
            openWorld: true
          call: "trellix-edr.list-threats"
          with:
            limit: "tools.limit"
            since: "tools.since"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-detections
          description: "List endpoint detections"
          hints:
            readOnly: true
            openWorld: true
          call: "trellix-edr.list-detections"
          with:
            limit: "tools.limit"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-alerts
          description: "List security alerts"
          hints:
            readOnly: true
            openWorld: true
          call: "trellix-edr.list-alerts"
          with:
            limit: "tools.limit"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-search
          description: "Create a real-time search across endpoints"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "trellix-edr.create-search"
          with:
            query: "tools.query"
            hosts: "tools.hosts"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-reaction
          description: "Execute a response reaction on an endpoint (isolate, scan, etc.)"
          hints:
            readOnly: false
            destructive: true
            idempotent: false
          call: "trellix-edr.create-reaction"
          with:
            type: "tools.type"
            hostId: "tools.hostId"
          outputParameters:
            - type: object
              mapping: "$."
